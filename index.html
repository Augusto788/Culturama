<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culturama</title>
</head>
<body>
    <header>
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        <form action="" method="get">
            <fieldset>
            <legend>Dados Pessoais</legend>
            <label for="Name">Nome</label>
            <input id="Name" name="userName" required>
            <br>

            <label for="Age">Idade</label>
            <input id="Age" name="UserAge" min="12" max="100" required>
            <br>

            <label for="birthday">Data de Nascimento</label>
            <input id="birthday" name="birthdate">
            <br>

            <label for="Email">Email</label>
            <input id="Email" name="UserEmail" required>
            <br>

            <label for="PhoneNumber">Telefone</label>
            <input id="PhoneNumber" name="UserPhoneNumber" pattern="[0-9]{11}" placeholder="DDD + Numero">
            <br>

            <label for="Image">Upload de Foto</label>
            <input id="Image" type="file" accept="image/*" name="UserImage">
            <br>
            </fieldset>
            
            <fieldset>
                <legend>Perfil</legend>

                <p>Gênero:</p>
                <input id="fem" type="radio" name="UserGender" value="Feminino">
                <label for="fem">Feminino</label>
                <input id="man" type="radio" name="UserGender" value="Masculino">
                <label for="man">Masculino</label>
                <input id="N informed" type="radio" name="UserGender" value="Not Informed">
                <label for="N informed">Prefiro não informar</label>
                <br>

                
                <label for="MaritalStatus">Estado Civil:</label>
                <select id="MaritalStatus" name="UserMaritalStatus">
                    <option value="NotInformed">Selecione...</option>
                    <option value="Casado">Casado</option>
                    <option value="Solteiro">Solteiro</option>
                    <option value="Viúvo">Viúvo</option>
                    <option value="Divorciado">Divorciado</option>
                    <option value="Casado">União Estavel</option>
                </select>
                <br>

                <label for="State">Estado:</label>
                <select id="State" name="UserState" required>
                    <option value="Acre">Acre</option>
                    <option value="Alagoas">Alagoas</option>
                    <option value="Amapa">Amapá</option>
                    <option value="Amazonas">Amazonas</option>
                    <option value="Bahia">Bahia</option>
                    <option value="Ceara">Ceará</option>
                    <option value="Distrito Federal">Distrito Federal</option>
                    <option value="Espirito Santo">Espírito Santo</option>
                    <option value="Goias">Goiás</option>
                    <option value="Maranhao">Maranhão</option>
                    <option value="Mato Grosso do Sul">Mato Grosso do Sul</option>
                    <option value="Mato Grosso">Mato Grosso</option>
                    <option value="Minas Gerais">Minas Gerais</option>
                    <option value="Para">Pará</option>
                    <option value="Paraiba">Paraíba</option>
                    <option value="Parana">Paraná</option>
                    <option value="Pernambuco">Pernambuco</option>
                    <option value="Piaui">Piauí</option>
                    <option value="Rio de Janeiro">Rio de Janeiro</option>
                    <option value="Rio Grande do Norte">Rio Grande do Norte</option>
                    <option value="Rio Grande do Sul">Rio Grande do Sul</option>
                    <option value="Rondonia">Rondônia</option>
                    <option value="Roraima">Roraima</option>
                    <option value="Santa Catarina">Santa Catarina</option>
                    <option value="Sao Paulo">São Paulo</option>
                    <option value="Sergipe">Sergipe</option>
                    <option value="Tocantins">Tocantins</option>
                </select>
                <br>

                <label for="userCity">Cidade:</label>
                <input type="text" id="userCity" name="userCity" autocomplete="address-level2" placeholder="Ex.: Fortaleza" />
            </fieldset>

            <fieldset>
                <legend>Hábitos</legend>
                <p>Redes Sociais</p>
                <input id="Instagram" type="checkbox" name="social" value="instagram">
                <label for="Instagram">Instagram</label>
                <br>
                <input id="Facebook" type="checkbox" name="social" value="Facebook">
                <label for="Facebook">Facebook</label>
                <br>
                <input id="Linkedin" type="checkbox" name="social" value="Linkedin">
                <label for="Linkedin">Linkedin</label>
                <br>
                <input id="X" type="checkbox" name="social" value="X">
                <label for="X">X</label>
                <br>

                <label for="MusicStyle">Estilo  Musical:</label>
                <input list="StyleTypes" id="MusicStyle" name="UserMusicStyle" type="text">
                <datalist id="StyleTypes">
                <option value="Rock">
                <option value="Pop">
                <option value="Samba">
                <option value="Sertanejo">
                </datalist>
                <br>

                <label for="Favoritecollor">Cor Favorita</label>
                <input type="color" id="FavoriteColor" name="UserFavoriteColor">
            </fieldset> 

            <button type="submit">Enviar</button>
        </form>
    </section>
</body>
</html>
